# ClickHouse observability backend.
# The OTel Collector runs natively on each WHPG cluster node.
# See otel-collector-whpg-node.yaml for the collector config.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native TCP interface
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-otelpassword}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  ch-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    container_name: ch-ui
    ports:
      - "3488:3488"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-otelpassword}
    volumes:
      - ch_ui_data:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  clickhouse_data:
  clickhouse_logs:
  ch_ui_data:
